			function delay (URL) {
				setTimeout( function() { window.location = URL }, 200 );
			}
		</script>

					<a href="javascript:delay('\home.html')" class="navlink lower" id="homelink">Home</a>

                    <!-- haha i do not know what i am doing! thanks coding train challenges btw -->

			</footer>
			
		</div>
		<button onclick="topFunction()" id="topBtn" title="Go to top">Top</button>
		<script>
			let mybutton = document.getElementById("topBtn");

			window.onscroll = function() {scrollFunction()};

			function scrollFunction() {
				if (document.body.scrollTop > 1000 || document.documentElement.scrollTop > 1000) {
					mybutton.style.display = "block";
				} else {
					mybutton.style.display = "none";
				}
			}

			function topFunction() {
				document.body.scrollTop = 0;
				document.documentElement.scrollTop = 0;
			} 
		</script>
		<div>
			<div id="playbanner" class="playbanner"><p id="playbannerlabel">&gt;</p></div>
			<iframe id="playerframe" class="playerframe" src="player.html"></iframe>
		</div>
        <script>
            window.addEventListener("keydown", function(e) {
				if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
					e.preventDefault();
				}
			}, false);
			function getRandomInt(min, max) {
				min = Math.ceil(min);
				max = Math.floor(max);
				return Math.floor(Math.random() * (max - min)) + min;
			}
			n = getRandomInt(1,24);
			if (n==2||n==3||n==12||n==13){
				document.getElementById("motm").src = "resources/randimg/"+n+".gif";
			} else if (n==8||n==10){
				document.getElementById("motm").src = "resources/randimg/"+n+".png";
			} else {
				document.getElementById("motm").src = "resources/randimg/"+n+".jpg";
			}
        </script>
