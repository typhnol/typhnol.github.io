			<script>
				// thank you stackoverflow... there is still a slight delay due to page loading times but it'll have to do
				const music = document.getElementById("music");
				music.volume = 0.5;

				function setCookie(c_name,value,exdays)
				{
					var exdate=new Date();
					exdate.setDate(exdate.getDate() + exdays);
					var c_value=escape(value) + ((exdays==null) ? "" : "; expires="+exdate.toUTCString());
					document.cookie=c_name + "=" + c_value;
				}

				function getCookie(c_name)
				{
					var i,x,y,ARRcookies=document.cookie.split(";");
					for (i=0;i<ARRcookies.length;i++)
					{
					x=ARRcookies[i].substr(0,ARRcookies[i].indexOf("="));
					y=ARRcookies[i].substr(ARRcookies[i].indexOf("=")+1);
					x=x.replace(/^\s+|\s+$/g,"");
					if (x==c_name)
						{
						return unescape(y);
						}
					}
				}

				var song = document.getElementsByTagName('audio')[0];
				var played = false;
				var tillPlayed = getCookie('timePlayed');
				function update()
				{
					if(!played){
						if(tillPlayed){
						song.currentTime = tillPlayed;
						song.play();
						played = true;
						}
						else {
								song.play();
								played = true;
						}
					}

					else {
					setCookie('timePlayed', song.currentTime);
					}
				}
				setInterval(update, 500);
			</script>

        <script>
            window.addEventListener("keydown", function(e) {
				if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
					e.preventDefault();
				}
			}, false);
			function getRandomInt(min, max) {
				min = Math.ceil(min);
				max = Math.floor(max);
				return Math.floor(Math.random() * (max - min)) + min;
			}
			n = getRandomInt(1,24);
			if (n==2||n==3||n==12||n==13){
				document.getElementById("motm").src = "resources/randimg/"+n+".gif";
			} else if (n==8||n==10){
				document.getElementById("motm").src = "resources/randimg/"+n+".png";
			} else {
				document.getElementById("motm").src = "resources/randimg/"+n+".jpg";
			}
