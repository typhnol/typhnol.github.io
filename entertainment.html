			<section>

        <script>
            window.addEventListener("keydown", function(e) {
				if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
					e.preventDefault();
				}
			}, false);
			function getRandomInt(min, max) {
				min = Math.ceil(min);
				max = Math.floor(max);
				return Math.floor(Math.random() * (max - min)) + min;
			}

			meme = document.getElementById("motm");

			function changeImg() {
				n = getRandomInt(1,24);
				if (n==2||n==3||n==12||n==13){
					meme.src = "resources/randimg/"+n+".gif";
				} else if (n==8||n==10){
					meme.src = "resources/randimg/"+n+".png";
				} else {
					meme.src = "resources/randimg/"+n+".jpg";
				}
			}
			
			changeImg();

			meme.addEventListener("click", changeImg);
        </script>
