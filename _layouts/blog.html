---
layout: default
---
<head>
	<link rel="stylesheet" href="style.css">
	<script src="/sfx.js" defer></script>
	<script src="/banners.js" defer></script>
	<script>
		function delay (URL) {
				setTimeout( function() { window.location = URL }, 200 );
		}
	</script>
</head>
<div class="wholething">
	<!-- one massive shit hole -->
	<div class="titlenav">
		<header>
			<h1><img class="title" src="resources/title.gif" alt="Typhnol"></h1>
		</header>
		<nav>
			<a href="javascript:delay('\home.html')" class="navlink lower" id="homelink">Home</a>
			<a href="javascript:delay('\about.html')" class="navlink lower" id="aboutlink">About</a>
			<a href="javascript:delay('\art.html')" class="navlink lower" id="artlink">Art</a>
			<a href="javascript:delay('/blog.html')" class="navlink lower" id="bloglink">Blog</a>
			<a href="javascript:delay('\entertainment.html')" class="navlink lower" id="funlink">Fun</a>
		</nav>
	</div>
	<section>
		<h2>{{ site.title }}</h2>
		<div class="bloglistcontainer">
			<ul class="bloglist">
			  {% for post in site.posts %}
				<li class="bloglistitem">
				  <a href="{{ post.url }}">{{ post.title }}</a>
				  <span>{{ post.date | date: "%b %-d, %Y" }}</span>
				</li>
			  {% endfor %}
			</ul>
		</div>
	</section>
	<footer>
		<p class="footer">Since 2024-typhnol</p>
	</footer>
	<button onclick="topFunction()" id="topBtn" title="Go to top">Top</button>
	<script>
		let mybutton = document.getElementById("topBtn");

		window.onscroll = function() {scrollFunction()};

		function scrollFunction() {
			if (document.body.scrollTop > 1000 || document.documentElement.scrollTop > 1000) {
				mybutton.style.display = "block";
			} else {
				mybutton.style.display = "none";
			}
		}

		function topFunction() {
			document.body.scrollTop = 0;
			document.documentElement.scrollTop = 0;
		} 
	</script>
	<div>
		<div id="playbanner" class="playbanner"><p id="playbannerlabel">&gt;</p></div>
		<iframe id="playerframe" class="playerframe" src="player.html"></iframe>
	</div>
</div>
